<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; }
  body { width: 512px; height: 512px; overflow: hidden; }
  .tile {
    width: 512px; height: 512px;
    background: linear-gradient(135deg, #1b2130 0%, #131720 60%);
    display: flex; align-items: center; justify-content: center;
    border-radius: 96px;
  }
  .bolt { font-size: 300px; filter: drop-shadow(0 0 40px rgba(88, 204, 2, 0.55)); }
</style></head>
<body><div class="tile"><div class="bolt">⚡</div></div></body>
</html>
