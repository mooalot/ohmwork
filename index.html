<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ohmwork — EE Practice</title>
  <link rel="stylesheet" href="vendor/katex.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect width='48' height='48' rx='10' fill='%230a0f0d'/><path d='M5 24h6l4-8 6 16 6-16 6 16 6-16 4 8h0' fill='none' stroke='%233df5a6' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta name="theme-color" content="#0a0f0d">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="brand" id="brand-home" title="Home">
        <svg width="44" height="18" viewBox="0 0 48 20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1 10h6l4-7 6 14 6-14 6 14 6-14 4 7h8"/></svg>
        <span>Ω<span class="ohm">hmwork</span></span>
      </div>
      <div class="stats">
        <div class="stat" id="stat-streak" title="Daily streak">
          <svg width="15" height="17" viewBox="0 0 24 26"><path d="M12 1c1.2 6 7 7.5 7 14a7 7 0 1 1-14 0c0-3.5 2.2-5 3.5-8.4 1.2 2.4 2.6 3.4 3.5 2.4-1.2-2.6-.4-5.4 0-8z" fill="currentColor"/></svg>
          <b>0</b>
        </div>
        <div class="stat" id="stat-xp" title="Total XP">
          <svg width="14" height="17" viewBox="0 0 20 26"><path d="M13 1 2 15h7l-2 10L18 11h-7z" fill="currentColor"/></svg>
          <b>0</b>
        </div>
        <div class="stat" id="stat-level" title="Level">Lv <b>1</b></div>
      </div>
    </header>
    <main id="screen"><!-- screens render here --></main>
  </div>
  <script src="vendor/katex.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
